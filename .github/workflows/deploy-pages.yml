name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # 매일 저녁 8시 KST(11:00 UTC)에 그 주 공개 편을 자동으로 열어 재배포.
    # GitHub Actions 예약은 고부하 시 1시간+ 지연·누락이 잦다. 20:00~22:00 KST를
    # 30분 간격으로 촘촘히 깔아, 하나라도 돌면 그날 공개 편이 열리게 한다(빌드는 idempotent).
    - cron: '0 11 * * *'    # 20:00 KST
    - cron: '30 11 * * *'   # 20:30 KST
    - cron: '0 12 * * *'    # 21:00 KST
    - cron: '30 12 * * *'   # 21:30 KST
    - cron: '0 13 * * *'    # 22:00 KST

permissions:
  contents: read
  pages: write
  id-token: write

# 한 번에 하나의 Pages 배포만. 진행 중 배포는 취소하지 않고 완료시킨다
# (GitHub 공식 권장). 동시 실행이 같은 run에 아티팩트를 중복 업로드하던 문제 방지.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build weekly series page (date-gated)
        run: python3 generate_series.py

      - name: Validate site
        run: python3 scripts/validate_site.py

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site/ folder as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
