<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>골프 경기력 핵심 연구 20선</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/mascot.png">
<style>
:root{--bg:#FDEEF3;--bg-soft:#FCE4EC;--hot:#FF1E88;--hot-deep:#E60F73;--ink:#0E0E10;--white:#FFFFFF;--line:#F4C9DC;--muted:#6B5560;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Pretendard','Apple SD Gothic Neo','Segoe UI',system-ui,sans-serif;line-height:1.65;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{max-width:720px;margin:0 auto;padding:56px 24px 72px;text-align:center}
.logo{width:154px;height:auto;display:block;margin:0 auto 18px;filter:drop-shadow(0 14px 28px rgba(230,15,115,.42))}
.ig{display:inline-flex;align-items:center;gap:8px;margin-top:30px;font-size:14px;font-weight:800;color:var(--hot-deep);text-decoration:none;background:var(--white);border:1px solid var(--line);padding:9px 18px;border-radius:999px;box-shadow:0 6px 20px -12px rgba(230,15,115,.5);transition:transform .15s ease,box-shadow .15s ease}
.ig:hover{transform:translateY(-2px);box-shadow:0 12px 26px -12px rgba(230,15,115,.6)}
.kicker{display:inline-block;background:var(--hot);color:#fff;font-size:13px;font-weight:800;letter-spacing:.14em;padding:7px 16px;border-radius:999px;margin-bottom:24px}
h1{font-size:38px;font-weight:900;letter-spacing:-.02em;line-height:1.25}
h1 span{color:var(--hot)}
.sub{margin-top:16px;color:var(--muted);font-size:16px;max-width:560px;margin-left:auto;margin-right:auto}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:44px}
.opt{display:block;text-decoration:none;color:inherit;background:var(--white);border:1px solid var(--line);border-radius:20px;padding:30px 26px;text-align:left;box-shadow:0 6px 22px -14px rgba(230,15,115,.4);transition:transform .15s ease,box-shadow .15s ease}
.opt:hover{transform:translateY(-4px);box-shadow:0 16px 34px -16px rgba(230,15,115,.6)}
.opt .lab{display:inline-block;font-size:12px;font-weight:800;letter-spacing:.1em;padding:5px 12px;border-radius:999px;margin-bottom:16px}
.opt.v1 .lab{background:var(--hot);color:#fff}
.opt.v2 .lab{background:var(--ink);color:#fff}
.opt h2{font-size:22px;font-weight:900;letter-spacing:-.01em}
.opt p{margin-top:10px;font-size:14px;color:var(--muted);line-height:1.6}
.opt .go{display:inline-block;margin-top:18px;font-size:13px;font-weight:800;color:var(--hot-deep)}
.foot{margin-top:40px;font-size:13px;color:var(--muted);line-height:1.7}
@media(max-width:560px){.cards{grid-template-columns:1fr}h1{font-size:29px}}
</style></head>
<body><div class="wrap">
  <img class="logo" src="assets/mascot.png" alt="마미손 골프 마스코트">
  <span class="kicker">GOLF PERFORMANCE · RESEARCH</span>
  <h1>골프 경기력을 만든<br><span>핵심 연구 20선</span></h1>
  <p class="sub">비거리·정확성·퍼팅·부상예방까지, 학술적으로 영향력 있는 논문 20편. 두 가지 버전으로 정리했습니다.</p>
  <div class="cards">
    <a class="opt v1" href="golf-research-summary.html">
      <span class="lab">VERSION 1</span>
      <h2>카드용 요약</h2>
      <p>인스타그램 카드 업로드에 맞춘 간결한 요약판. 핵심 발견을 한눈에.</p>
      <span class="go">보기 →</span>
    </a>
    <a class="opt v2" href="v2/golf-research-v2.html">
      <span class="lab">VERSION 2</span>
      <h2>전문가용 근거 자료집</h2>
      <p>연구 설계·표본·핵심 통계·한계까지 담은 전문가용 상세판.</p>
      <span class="go">보기 →</span>
    </a>
  </div>
  <a class="ig" href="https://www.instagram.com/mummys_hand_golf/" target="_blank" rel="noopener">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5.5"/><circle cx="12" cy="12" r="4"/><circle cx="17.6" cy="6.4" r="1.1" fill="currentColor" stroke="none"/></svg>
    @mummys_hand_golf
  </a>
  <div class="foot">인용 수는 데이터베이스·시점에 따라 달라지므로 순서는 대략적 영향력 기준입니다.</div>
</div>
</body></html>
