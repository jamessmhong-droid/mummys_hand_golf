<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>골프 핵심 연구 18선 — 매주 연재</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/mascot.png">
<style>
:root{--bg:#FDEEF3;--bg-soft:#FCE4EC;--hot:#FF1E88;--hot-deep:#E60F73;--ink:#0E0E10;--white:#FFFFFF;--line:#F4C9DC;--muted:#6B5560;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Pretendard','Apple SD Gothic Neo','Segoe UI',system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}
.wrap{max-width:900px;margin:0 auto;padding:34px 20px 90px}
.sitenav{display:flex;flex-wrap:wrap;justify-content:center;gap:5px;margin:0 auto 20px}
.sitenav a{font-size:12.5px;font-weight:800;color:var(--muted);text-decoration:none;padding:7px 13px;border-radius:999px}
.sitenav a:hover{color:var(--hot-deep);background:var(--bg-soft)}
.sitenav a.cur{color:#fff;background:var(--hot)}
.hero{text-align:center;padding:6px 0 26px}
.logo{width:96px;height:auto;display:block;margin:0 auto 14px;filter:drop-shadow(0 12px 24px rgba(230,15,115,.4))}
.kicker{display:inline-block;background:var(--hot);color:#fff;font-size:12px;font-weight:800;letter-spacing:.13em;padding:6px 14px;border-radius:999px;margin-bottom:14px}
.hero h1{font-size:32px;font-weight:900;letter-spacing:-.02em;line-height:1.24}
.hero h1 span{color:var(--hot)}
.hero p{margin-top:12px;color:var(--muted);font-size:15px;max-width:560px;margin:12px auto 0}
.prog{max-width:560px;margin:22px auto 0}
.progbar{height:12px;background:var(--bg-soft);border:1px solid var(--line);border-radius:999px;overflow:hidden}
.progbar span{display:block;height:100%;background:var(--hot);border-radius:999px;transition:width .6s ease}
.proglabel{margin-top:8px;font-size:12.5px;font-weight:800;color:var(--muted)}

.feature{background:var(--ink);color:#fff;border-radius:24px;padding:28px 28px 26px;margin:30px 0 14px;box-shadow:0 20px 50px -26px rgba(230,15,115,.6);position:relative;overflow:hidden}
.feature::after{content:"";position:absolute;right:-40px;top:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(255,30,136,.5),transparent 70%)}
.feature .tag{display:inline-block;background:var(--hot);color:#fff;font-size:12px;font-weight:800;letter-spacing:.1em;padding:5px 13px;border-radius:999px}
.feature .no{font-size:15px;font-weight:800;color:#FF7DB4;margin-left:8px}
.feature h2{font-size:29px;font-weight:900;letter-spacing:-.02em;line-height:1.28;margin:14px 0 8px;position:relative}
.feature .t{font-size:15px;color:#EBC9D9;font-weight:600}
.feature .go{display:inline-flex;align-items:center;gap:8px;margin-top:20px;background:var(--hot);color:#fff;font-size:15px;font-weight:800;text-decoration:none;padding:13px 22px;border-radius:999px;position:relative}
.countdown{margin:16px 0 26px;text-align:center;font-size:14px;font-weight:800;color:var(--muted)}
.countdown b{color:var(--hot-deep);font-size:16px}

.sechead{font-size:14px;font-weight:900;color:var(--hot-deep);text-transform:uppercase;letter-spacing:.05em;margin:28px 0 14px;display:flex;align-items:center;gap:9px}
.sechead::before{content:"";width:10px;height:10px;background:var(--hot);border-radius:3px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.ep{display:block;text-decoration:none;color:inherit;background:var(--white);border:1px solid var(--line);border-radius:16px;padding:16px 16px 15px;position:relative;transition:transform .14s ease,box-shadow .14s ease}
.ep.open:hover{transform:translateY(-3px);box-shadow:0 14px 30px -16px rgba(230,15,115,.5)}
.ep .epno{font-size:22px;font-weight:900;color:var(--hot)}
.ep .ephook{font-size:13.5px;font-weight:800;line-height:1.45;margin-top:6px;color:var(--ink);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.ep .epgo{font-size:11.5px;font-weight:800;color:var(--hot-deep);margin-top:10px;display:inline-block}
.ep.lock{background:var(--bg-soft);border-style:dashed}
.ep.lock .epno{color:var(--line)}
.ep.lock .ephook{color:var(--muted)}
.ep .lockrow{font-size:11.5px;font-weight:800;color:var(--muted);margin-top:10px}
.ep .badge{position:absolute;top:12px;right:12px;font-size:16px}

.foot{margin-top:34px;text-align:center}
.foot a.full{display:inline-block;background:var(--white);border:1px solid var(--line);border-radius:999px;padding:11px 20px;font-size:13.5px;font-weight:800;color:var(--hot-deep);text-decoration:none}
.ig{display:inline-flex;align-items:center;gap:8px;margin-top:16px;font-size:14px;font-weight:800;color:var(--hot-deep);text-decoration:none}
.ig img{width:24px;height:24px}
.note{margin-top:22px;font-size:12px;color:var(--muted);text-align:center;line-height:1.7}
@media(max-width:620px){.grid{grid-template-columns:repeat(2,1fr)}.hero h1{font-size:26px}.feature h2{font-size:24px}}
</style></head>
<body><div class="wrap">
<nav class="sitenav">
  <a href="index.html">🏠 홈</a>
  <a href="series.html" class="cur">📅 연재</a>
  <a href="golf-research-summary.html">V1 카드</a>
  <a href="v2/golf-research-v2.html">V2 근거</a>
  <a href="v3/index.html">V3 딥다이브</a>
</nav>

<header class="hero">
  <img class="logo" src="assets/mascot.png" alt="마미손 골프 마스코트">
  <span class="kicker">WEEKLY SERIES · 매주 1편</span>
  <h1>골프를 바꾼 <span>핵심 연구 18선</span><br>매주 한 편씩</h1>
  <p>골프는 18홀, 그래서 핵심 연구도 18선. 매주 한 편씩 카드로 풀어갑니다. 놓친 편은 아래에서 다시 보기.</p>
  <div class="prog"><div class="progbar"><span id="pbar" style="width:0%"></span></div><div class="proglabel" id="plabel">— / 18 공개</div></div>
</header>

<div id="feature" class="feature"></div>
<div class="countdown" id="countdown"></div>

<div class="sechead">전체 회차</div>
<div class="grid" id="grid"></div>

<div class="foot">
  <a class="full" href="index.html">📚 전체 자료집 보기 (카드·근거·딥다이브)</a><br>
  <a class="ig" href="https://www.instagram.com/mummys_hand_golf/" target="_blank" rel="noopener">
    <img src="assets/wm.png" alt="">@mummys_hand_golf</a>
  <p class="note">매주 공개 일정은 자동 갱신됩니다. 인용 순서는 대략적 영향력 기준.</p>
</div>
</div>

<script>
// ▼▼ 연재 시작일만 바꾸면 됩니다 (첫 편 공개 날짜, 월요일 권장) ▼▼
var START = new Date('2026-07-06T00:00:00+09:00');
var CADENCE_DAYS = 7; // 매주
// ▲▲ ─────────────────────────────────────────── ▲▲

var SCHEDULE = [
 {n:1, hook:"장타는 ‘힘’으로만 치는 게 아니다?", title:"비거리·정확성의 생체역학", file:"pages/paper-01.html"},
 {n:2, hook:"집에서 밴드 하나로 비거리가 는다면?", title:"8주 골프 특화 운동 프로그램", file:"pages/paper-02.html"},
 {n:3, hook:"골반을 ‘덜’ 돌려야 볼 스피드가 오른다?", title:"드라이빙의 상체·골반 회전", file:"pages/paper-03.html"},
 {n:4, hook:"X팩터, 크기보다 중요한 게 따로 있다.", title:"다운스윙 X-Factor Stretch", file:"pages/paper-04.html"},
 {n:5, hook:"싱글의 스윙엔 ‘순서’가 있다.", title:"엉덩이·어깨 회전 시퀀스", file:"pages/paper-05.html"},
 {n:6, hook:"티오프 전 5분이 클럽 스피드를 바꾼다.", title:"골프 워밍업과 수행", file:"pages/paper-06.html"},
 {n:7, hook:"힘만 키우면 장타? 절반만 맞다.", title:"스윙의 일·파워 분석", file:"pages/paper-07.html"},
 {n:8, hook:"볼 스피드의 73%는 이 4가지로 정해진다.", title:"생체역학 변수와 드라이빙", file:"pages/paper-08.html"},
 {n:9, hook:"스윙이 매번 흔들리는 게 나쁜 걸까?", title:"스윙의 움직임 변동성", file:"pages/paper-09.html"},
 {n:10, hook:"퍼팅은 손목이 아니다.", title:"퍼팅 생체역학 — 골반·몸통", file:"pages/paper-10.html"},
 {n:11, hook:"‘퍼팅이 우승을 만든다’는 거짓말?", title:"PGA 투어 Strokes Gained", file:"pages/paper-11.html"},
 {n:12, hook:"현대 골프 과학은 이 책에서 시작됐다.", title:"Search for the Perfect Swing", file:"pages/paper-12.html"},
 {n:13, hook:"스윙의 주인공은 팔이 아니었다.", title:"스윙 중 근활성(EMG)", file:"pages/paper-13.html"},
 {n:14, hook:"프로와 아마의 차이는 ‘힘’이 아니다.", title:"프로·아마추어 스윙 운동학", file:"pages/paper-16.html"},
 {n:15, hook:"잘 치는 선수는 대체 뭐가 다를까?", title:"엘리트 골프: 결과·기술·신체", file:"pages/paper-17.html"},
 {n:16, hook:"핸디캡을 낮추는 건 스윙이 아니라 몸?", title:"근력·유연성·균형", file:"pages/paper-18.html"},
 {n:17, hook:"라운드 후반에 무너지는 진짜 이유.", title:"골프 경기력과 생리학", file:"pages/paper-19.html"},
 {n:18, hook:"요통 없이 비거리까지 늘리는 법.", title:"트레이닝을 통한 부상 예방", file:"pages/paper-20.html"},
];

var DAY = 24*3600*1000, TOTAL = SCHEDULE.length;
var now = new Date();
function unlockDate(i){ return new Date(START.getTime() + i*CADENCE_DAYS*DAY); } // i=0 → 1편
var unlocked = 0;
if (now >= START) unlocked = Math.min(TOTAL, Math.floor((now - START)/(CADENCE_DAYS*DAY)) + 1);

// progress
document.getElementById('pbar').style.width = (unlocked/TOTAL*100) + '%';
document.getElementById('plabel').textContent = unlocked + ' / ' + TOTAL + ' 공개';

// featured (latest unlocked) or "곧 시작"
var fEl = document.getElementById('feature');
if (unlocked >= 1){
  var f = SCHEDULE[unlocked-1];
  fEl.innerHTML = '<span class="tag">이번 주 공개</span><span class="no">EP.'+f.n+' / 18</span>'+
    '<h2>'+f.hook+'</h2><div class="t">'+f.title+'</div>'+
    '<a class="go" href="'+f.file+'">카드 보기 →</a>';
} else {
  var d0 = Math.ceil((START - now)/DAY);
  fEl.innerHTML = '<span class="tag">COMING SOON</span>'+
    '<h2>곧 시작합니다</h2><div class="t">첫 편 공개까지 D-'+Math.max(0,d0)+'</div>'+
    '<a class="go" href="index.html">미리 전체 보기 →</a>';
}

// countdown to next
var cEl = document.getElementById('countdown');
if (unlocked < TOTAL){
  var next = unlockDate(unlocked); // next episode index = unlocked (0-based) → EP unlocked+1
  var d = Math.ceil((next - now)/DAY);
  cEl.innerHTML = '다음 편(EP.'+(unlocked+1)+')까지 <b>D-'+Math.max(0,d)+'</b>';
} else {
  cEl.innerHTML = '🎉 18편 완결! 전체를 자료집에서 다시 보세요.';
}

// grid
var g = document.getElementById('grid'), html='';
for (var i=0;i<TOTAL;i++){
  var e = SCHEDULE[i];
  if (i < unlocked){
    html += '<a class="ep open" href="'+e.file+'"><span class="badge">🩷</span>'+
      '<div class="epno">'+String(e.n).padStart(2,'0')+'</div>'+
      '<div class="ephook">'+e.hook+'</div>'+
      '<span class="epgo">카드 보기 →</span></a>';
  } else {
    var ud = unlockDate(i);
    var k = new Date(ud.getTime() + 9*3600*1000); // KST wall-clock (뷰어 시간대 무관)
    var md = (k.getUTCMonth()+1)+'/'+k.getUTCDate();
    html += '<div class="ep lock"><span class="badge">🔒</span>'+
      '<div class="epno">'+String(e.n).padStart(2,'0')+'</div>'+
      '<div class="ephook">다음에 공개됩니다</div>'+
      '<div class="lockrow">'+md+' 공개 예정</div></div>';
  }
}
g.innerHTML = html;
</script>
</body></html>
